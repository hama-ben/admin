kind = "web"
previewPath = "/"
title = "Al-Shaibia Admin Panel"
version = "1.0.0"
id = "artifacts/al-shaibia-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23451

[services.development]
run = "pnpm --filter @workspace/al-shaibia-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/al-shaibia-admin", "run", "build" ]
publicDir = "artifacts/al-shaibia-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23451"
BASE_PATH = "/"
